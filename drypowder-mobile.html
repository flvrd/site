const JOBS=[];const banks=[{name:"Citizens Bank NA",last4:"6340",type:"Checking"},{name:"Chase Business",last4:"8821",type:"Checking"},{name:"Bank of America",last4:"4455",type:"Savings"}];

const baseAmts=[18720,22450,14780,31200,18950,12480,8760,28640,15220,42800,24600,35900,21200,8300,9450,11200,7800,6500,5200,4100,3800,2900,7200,6100,5400,4800,3200,2600,8900,7400,6300,5100,4200,3600,2800,9100,7800,6400,5300,4400,3700,3100,2500,8600,7100,6000,4900,4000,3400,2700];
let ai=0;
JOB_NAMES.forEach((jn,ji)=>{const id=jn.name.toLowerCase().replace(/\s/g,"");const numInv=ji<6?2+Math.floor(Math.random()*2):1+Math.floor(Math.random()*3);const invs=[];for(let k=0;k<numInv;k++){invNum++;const amt=baseAmts[ai%baseAmts.length];ai++;const isNew=ji>20&&k===0;invs.push({id:id+"i"+k,num:"#2401-"+invNum,total:amt,onStmt:!isNew,isNew,soldOn:dates[(ji*2+k)%dates.length],overdue:false})}totalInv+=invs.reduce((s,i)=>s+i.total,0);const creds=jn.cr.map((c,ci)=>({id:id+"c"+ci,type:c.type,ref:c.ref,date:crDates[(ji+ci)%crDates.length],amount:c.amt,onStmt:true,isNew:false}));JOBS.push({id,name:jn.name,sub:jn.sub,credits:creds,invoices:invs})});
const scale=TARGET/totalInv;JOBS.forEach(j=>{j.invoices.forEach(i=>{i.total=Math.round(i.total*scale*100)/100})});

let S={filter:"stmt",groupOn:true,sortMode:"balance-desc",searchOpen:false,searchText:"",filterOpen:false,payExpanded:false,payMethodOpen:false,addingMethod:false,addType:"bank",selectedBank:0,expanded:{},checked:{},crSel:{}};
JOBS.forEach(j=>{j.invoices.forEach(i=>{if(i.onStmt)S.checked[i.id]=true});j.credits.forEach(c=>{if(c.onStmt)S.crSel[c.id]=true})});

const fm=n=>"$"+Math.abs(n).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
const fc=n=>"("+fm(n)+")";
const sm=(a,f)=>parseFloat(a.reduce((s,x)=>s+f(x),0).toFixed(2));
const chk='<svg viewBox="0 0 10 8" fill="none" style="width:9px;height:7px"><path d="M1 4l3 3 5-6" stroke="#fff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>';
const chevSvg='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px"><polyline points="18 15 12 9 6 15"/></svg>';

function vis(){return JOBS.flatMap(j=>j.invoices.filter(i=>S.filter==="stmt"?i.onStmt:i.isNew).map(i=>({job:j,inv:i})))}
function visc(){return JOBS.flatMap(j=>j.credits.filter(c=>S.filter==="stmt"?c.onStmt:c.isNew).map(c=>({job:j,credit:c})))}
function chkd(){return JOBS.flatMap(j=>j.invoices.filter(i=>S.checked[i.id]).map(i=>({job:j,inv:i})))}
function crsel(){return JOBS.flatMap(j=>j.credits.filter(c=>S.crSel[c.id]).map(c=>({job:j,credit:c})))}
function vjids(){const a=vis(),b=visc(),s=new Set();a.forEach(p=>s.add(p.job.id));b.forEach(p=>s.add(p.job.id));return s}

function sortJ(list){
  const vi=vis(),vc=visc();
  return[...list].sort((a,b)=>{
    const bal=j=>sm(j.invoices,i=>i.total);const crt=j=>sm(vc.filter(p=>p.job.id===j.id),p=>p.credit.amount);const ic=j=>vi.filter(p=>p.job.id===j.id).length+vc.filter(p=>p.job.id===j.id).length;const nm=j=>(j.name+" "+j.sub).toLowerCase();
    switch(S.sortMode){
      case"name-asc":return nm(a).localeCompare(nm(b));case"name-desc":return nm(b).localeCompare(nm(a));
      case"balance-desc":return bal(b)-bal(a);case"balance-asc":return bal(a)-bal(b);
      case"credits-desc":return crt(b)-crt(a);case"credits-asc":return crt(a)-crt(b);
      case"items-desc":return ic(b)-ic(a);case"items-asc":return ic(a)-ic(b);
      default:return bal(b)-bal(a);
    }
  });

function filterSearch(jobs){if(!S.searchText)return jobs;const q=S.searchText.toLowerCase();return jobs.filter(j=>(j.name+" "+j.sub).toLowerCase().includes(q))}

  const ae=vJ.length>0&&vJ.every(j=>S.expanded[j.id]),ac=vi.length>0&&vi.every(p=>S.checked[p.inv.id]);
  const stmtInvs=JOBS.flatMap(j=>j.invoices.filter(i=>i.onStmt));
  const allStmt=stmtInvs.length>0&&stmtInvs.every(i=>S.checked[i.id]);
  const payLbl=allStmt&&S.filter==="stmt"?"Pay current statement":"Pay "+fm(pay)+" of statement";
  const fLabels={stmt:"Current statement","new":"Since last statement"};
  const ab=banks[S.selectedBank];
  const itemCount=S.groupOn?vJ.length+" job"+(vJ.length!==1?"s":""):vi.length+" inv";

  const sCol=S.sortMode.replace(/-asc|-desc/,""),sDir=S.sortMode.endsWith("-asc")?"asc":"desc";

    flatCr.forEach(p=>{

    vi.forEach(p=>{

  if(has){
    h+=`<div class="m-pay"><div class="m-pay-handle" onclick="mTogPay()"><div class="m-pay-handle-line"></div></div><div class="m-pay-collapsed"><div class="m-pay-total-row"><span class="m-pay-total-label">Total payment</span><span class="m-pay-total-amt">${fm(pay)}</span></div><div class="m-pay-bank"><span>${ab.name} ****${ab.last4}</span><button onclick="event.stopPropagation();mOpenPM()">Change</button></div></div>`;

function mSetF(f){S.filter=f;S.filterOpen=false;render()}

function mTogExp(id){S.expanded[id]=!S.expanded[id];render()}
function mTogInv(id){S.checked[id]=!S.checked[id];render()}
function mTogCr(id){S.crSel[id]=!S.crSel[id];render()}
function mTogJobChk(jid){const j=JOBS.find(x=>x.id===jid),v=j.invoices.filter(i=>S.filter==="stmt"?i.onStmt:i.isNew),on=v.every(i=>S.checked[i.id]);v.forEach(i=>S.checked[i.id]=!on);render()}

<script>
const RATE=0.097;
const JOBS=[

  {id:"johnson",name:"Johnson",sub:"School",credits:[{id:"jcr1",type:"Overpayment",ref:"PMT #7712",date:"02-01-2026",amount:145,onStmt:true,isNew:false}],invoices:[{id:"j1",num:"#2401-534901",total:482.15,onStmt:false,isNew:false,soldOn:"01-05-2026",overdue:false},{id:"j2",num:"#2401-534902",total:315.80,onStmt:false,isNew:false,soldOn:"01-18-2026",overdue:false},{id:"j3",num:"#2401-534903",total:198.40,onStmt:true,isNew:false,soldOn:"12-10-2025",overdue:true},{id:"j4",num:"#2401-534904",total:274.55,onStmt:true,isNew:false,soldOn:"11-15-2025",overdue:true},{id:"j5",num:"#2401-534905",total:391.20,onStmt:false,isNew:true,soldOn:"03-01-2026",overdue:false},{id:"j6",num:"#2401-534906",total:228.90,onStmt:false,isNew:true,soldOn:"03-08-2026",overdue:false}]},

  {id:"riverside",name:"Riverside",sub:"Commons",credits:[],invoices:[{id:"r1",num:"#2401-535001",total:892.40,onStmt:true,isNew:false,soldOn:"12-20-2025",overdue:true},{id:"r2",num:"#2401-535002",total:445,onStmt:true,isNew:false,soldOn:"01-10-2026",overdue:true},{id:"r3",num:"#2401-535003",total:310.75,onStmt:false,isNew:false,soldOn:"01-25-2026",overdue:false},{id:"r4",num:"#2401-535004",total:178.20,onStmt:false,isNew:true,soldOn:"03-02-2026",overdue:false}]},
  {id:"maplewood",name:"Maplewood",sub:"Estates",credits:[{id:"mcr1",type:"Volume discount",ref:"DSC #0441",date:"02-20-2026",amount:375,onStmt:true,isNew:false}],invoices:[{id:"m1",num:"#2401-535010",total:1240.50,onStmt:true,isNew:false,soldOn:"11-01-2025",overdue:true},{id:"m2",num:"#2401-535011",total:875.30,onStmt:true,isNew:false,soldOn:"11-20-2025",overdue:true},{id:"m3",num:"#2401-535012",total:620,onStmt:false,isNew:false,soldOn:"01-30-2026",overdue:false},{id:"m4",num:"#2401-535013",total:430.80,onStmt:false,isNew:true,soldOn:"03-04-2026",overdue:false},{id:"m5",num:"#2401-535014",total:290.45,onStmt:false,isNew:true,soldOn:"03-15-2026",overdue:false}]},
  {id:"grandview",name:"Grandview",sub:"Terraces",credits:[{id:"gcr1",type:"Overpayment",ref:"PMT #9031",date:"02-28-2026",amount:520,onStmt:true,isNew:false}],invoices:[{id:"g1",num:"#2401-535500",total:2140,onStmt:true,isNew:false,soldOn:"09-10-2025",overdue:true},{id:"g2",num:"#2401-535501",total:1380.50,onStmt:true,isNew:false,soldOn:"10-05-2025",overdue:true},{id:"g3",num:"#2401-535502",total:890.25,onStmt:false,isNew:false,soldOn:"02-01-2026",overdue:false},{id:"g4",num:"#2401-535503",total:560,onStmt:false,isNew:true,soldOn:"03-06-2026",overdue:false}]},
  {id:"lakeside",name:"Lakeside",sub:"Manor",credits:[{id:"lcr1",type:"Return — flooring",ref:"RTN #2401-535712",date:"01-15-2026",amount:480,onStmt:true,isNew:false}],invoices:[{id:"l1",num:"#2401-535700",total:1680,onStmt:true,isNew:false,soldOn:"08-15-2025",overdue:true},{id:"l2",num:"#2401-535701",total:945.60,onStmt:true,isNew:false,soldOn:"09-20-2025",overdue:true},{id:"l3",num:"#2401-535702",total:520.30,onStmt:false,isNew:false,soldOn:"02-08-2026",overdue:false},{id:"l4",num:"#2401-535703",total:310.45,onStmt:false,isNew:true,soldOn:"03-10-2026",overdue:false}]}
];

let S={filter:"stmt",groupOn:true,sortMode:"pastdue",sortOpen:false,filterOpen:false,payExpanded:false,payMethodOpen:false,addingMethod:false,addType:"bank",selectedBank:0,expanded:{},checked:{},crSel:{}};
const banks=[
  {name:"Citizens Bank NA",last4:"6340",type:"Checking"},
  {name:"Chase Business",last4:"8821",type:"Checking"},
  {name:"Bank of America",last4:"4455",type:"Savings"},
];
JOBS.forEach(j=>{j.invoices.forEach(i=>{if(i.onStmt)S.checked[i.id]=true});j.credits.forEach(c=>{if(c.onStmt)S.crSel[c.id]=true})});

const fm=n=>"$"+Math.abs(n).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
const fc=n=>"("+fm(n)+")";
const sm=(a,f)=>parseFloat(a.reduce((s,x)=>s+f(x),0).toFixed(2));
const chk='<svg viewBox="0 0 10 8" fill="none" style="width:10px;height:8px"><path d="M1 4l3 3 5-6" stroke="#fff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>';
const chevSvg='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px"><polyline points="18 15 12 9 6 15"/></svg>';
const sortSvg='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:12px;height:12px"><path d="M7 3v18M7 3l-4 4M7 3l4 4M17 21V3M17 21l-4-4M17 21l4-4"/></svg>';
const backSvg='<svg viewBox="0 0 24 24" fill="none" stroke="#111827" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:20px;height:20px"><polyline points="15 18 9 12 15 6"/></svg>';
const batSvg='<svg width="25" height="12" viewBox="0 0 25 12"><rect x="0" y="0" width="22" height="11" rx="2" stroke="#111" stroke-width="1" fill="none"/><rect x="1.5" y="1.5" width="17" height="8" rx="1" fill="#111"/><rect x="23" y="3" width="2" height="5" rx="1" fill="#111"/></svg>';
const wifiSvg='<svg width="16" height="12" viewBox="0 0 16 12" fill="#111"><path d="M8 10.5a1.5 1.5 0 110 3 1.5 1.5 0 010-3zM8 7c1.7 0 3.2.7 4.3 1.8l-1.4 1.4C10 9.4 9.1 9 8 9s-2 .4-2.9 1.2L3.7 8.8C4.8 7.7 6.3 7 8 7zm0-4c2.8 0 5.3 1.1 7.1 3l-1.4 1.4C12.2 5.9 10.2 5 8 5S3.8 5.9 2.3 7.4L.9 6C2.7 4.1 5.2 3 8 3z"/></svg>';
const sigSvg='<svg width="17" height="12" viewBox="0 0 17 12" fill="#111"><rect x="0" y="8" width="3" height="4" rx="0.5"/><rect x="4.5" y="5" width="3" height="7" rx="0.5"/><rect x="9" y="2" width="3" height="10" rx="0.5"/><rect x="13.5" y="0" width="3" height="12" rx="0.5"/></svg>';

function visInvs(){return JOBS.flatMap(j=>j.invoices.filter(i=>S.filter==="stmt"?i.onStmt:S.filter==="new"?i.isNew:true).map(i=>({job:j,inv:i})))}
function visCrs(){return JOBS.flatMap(j=>j.credits.filter(c=>S.filter==="stmt"?c.onStmt:S.filter==="new"?c.isNew:true).map(c=>({job:j,credit:c})))}
function allChecked(){return JOBS.flatMap(j=>j.invoices.filter(i=>S.checked[i.id]).map(i=>({job:j,inv:i})))}
function allCrSel(){return JOBS.flatMap(j=>j.credits.filter(c=>S.crSel[c.id]).map(c=>({job:j,credit:c})))}
function vjIds(){const vi=visInvs(),vc=visCrs(),s=new Set();vi.forEach(p=>s.add(p.job.id));vc.forEach(p=>s.add(p.job.id));return s}

function sortJobs(list){
  const vi=visInvs();
  return[...list].sort((a,b)=>{
    const pd=j=>sm(vi.filter(p=>p.job.id===j.id&&p.inv.overdue),p=>p.inv.total);
    const bal=j=>sm(j.invoices,i=>i.total);
    switch(S.sortMode){
      case"pastdue":return pd(b)-pd(a);case"pastdue-asc":return pd(a)-pd(b);
      case"balance-desc":return bal(b)-bal(a);case"balance-asc":return bal(a)-bal(b);
      case"name-asc":return(a.name+a.sub).localeCompare(b.name+b.sub);case"name-desc":return(b.name+b.sub).localeCompare(a.name+a.sub);
      default:return 0;
    }
  });
}

function render(){
  const vi=visInvs(),vc=visCrs(),ci=allChecked(),cs=allCrSel();
  const visT=sm(vi,p=>p.inv.total);
  const visPD=S.filter==="new"?0:parseFloat((visT*0.6).toFixed(2));
  const visCur=parseFloat((visT-visPD).toFixed(2));
  const visCrT=sm(vc,p=>p.credit.amount);
  const invSub=sm(ci,p=>p.inv.total),crApp=sm(cs,p=>p.credit.amount);
  const disc=invSub>0?parseFloat((invSub*RATE).toFixed(2)):0;
  const pay=Math.max(0,parseFloat((invSub-crApp-disc).toFixed(2)));
  const hasSel=ci.length>0;
  const stmtInvs=JOBS.flatMap(j=>j.invoices.filter(i=>i.onStmt));
  const allStmtSelected=stmtInvs.length>0&&stmtInvs.every(i=>S.checked[i.id]);
  const payLabel=allStmtSelected&&S.filter==="stmt"?"Pay current statement":"Pay "+fm(pay)+" of statement";
  const ids=vjIds();
  const vJ=sortJobs(JOBS.filter(j=>ids.has(j.id)));
  const allExp=vJ.length>0&&vJ.every(j=>S.expanded[j.id]);
  const allChk=vi.length>0&&vi.every(p=>S.checked[p.inv.id]);
  const curLabel=S.filter==="stmt"?"Current statement":S.filter==="new"?"Since last statement":"All current";
  const sortLabels={pastdue:"Most past due","pastdue-asc":"Least past due","balance-desc":"Highest balance","balance-asc":"Lowest balance","name-asc":"Name A–Z","name-desc":"Name Z–A"};

  let h=`<div class="status-bar"><span class="status-time">9:41</span><div class="status-icons">${sigSvg}${wifiSvg}${batSvg}</div></div>`;

  h+=`<div class="header"><div class="header-left"><div class="back-arrow">${backSvg}</div><div class="header-title"><div>Bliffert Lumber & Design</div><div>Harbor Homes charges</div></div></div><div class="avatar-sm">RJ</div></div>`;

  const chevDown='<svg viewBox="0 0 24 24" fill="none" stroke="#111827" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px"><polyline points="6 9 12 15 18 9"/></svg>';
  const filterLabels={stmt:"Current statement","new":"Since last statement",all:"All charges"};

  h+=`<div class="filter-dd">
    <button class="filter-dd-btn" onclick="togFilter()">${filterLabels[S.filter]}${chevDown}</button>
    <div class="filter-dd-menu${S.filterOpen?" open":""}">
      ${Object.entries(filterLabels).map(([k,v])=>`<button class="filter-dd-opt${S.filter===k?" active":""}" onclick="setF('${k}')">${v}</button>`).join("")}
    </div>
  </div>`;

  h+=`<div class="scroll">`;

  h+=`<div class="stats-m">
    <div class="stat-m"><div class="stat-m-label">Total due</div><div class="stat-m-val">${fm(visT)}</div></div>
    <div class="stat-m"><div class="stat-m-label">${S.filter==="stmt"?"Current":S.filter==="new"?"New":"Current"}</div><div class="stat-m-val">${fm(visCur)}</div></div>
    ${S.filter!=="new"?`<div class="stat-m"><div class="stat-m-label">Past due</div><div class="stat-m-val">${fm(visPD)}</div></div>`:""}
    ${visCrT>0?`<div class="stat-m"><div class="stat-m-label">Total credits</div><div class="stat-m-val green">-${fm(visCrT)}</div></div>`:""}
  </div>`;

  h+=`<div class="ctrl-m">
    <span class="ctrl-m-count">${S.groupOn?vJ.length+" job"+(vJ.length!==1?"s":""):vi.length+" inv"}</span>
    <button class="ctrl-m-btn" onclick="togSelAll()">${allChk?"Deselect":"Select all"}</button>
    ${S.groupOn?`<button class="ctrl-m-btn" onclick="togExpAll()">${allExp?"Collapse":"Expand"}</button>`:""}
    <span style="flex:1"></span>
    <div class="toggle-m"><div class="toggle-m-track${S.groupOn?" on":""}" onclick="togGroup()"><div class="toggle-m-thumb"></div></div><span class="toggle-m-label" onclick="togGroup()">Group</span></div>
  </div>`;

  h+=`<div class="sort-m"><button onclick="togSort()">${sortSvg} ${sortLabels[S.sortMode]}</button>
    <div class="sort-m-menu${S.sortOpen?" open":""}">
      ${Object.entries(sortLabels).map(([k,v])=>`<button class="sort-m-opt${S.sortMode===k?" active":""}" onclick="setSort('${k}')">${v}</button>`).join("")}
    </div>
  </div>`;

  if(S.groupOn){
    vJ.forEach(job=>{
      const pairs=vi.filter(p=>p.job.id===job.id);
      const jobCr=vc.filter(p=>p.job.id===job.id);
      const jpd=sm(pairs.filter(p=>p.inv.overdue),p=>p.inv.total);
      const jCrT=sm(jobCr,p=>p.credit.amount);
      const allOn=pairs.length>0&&pairs.every(p=>S.checked[p.inv.id]);
      const exp=S.expanded[job.id];
      const ic=pairs.length,cc=jobCr.length;
      const parts=[];if(ic)parts.push(ic+" inv");if(cc)parts.push(cc+" cr");

      h+=`<div class="job-m"><div class="job-m-hdr" onclick="togExp('${job.id}')">
        <div class="chk-m${allOn?" on":""}" onclick="event.stopPropagation();togJobChk('${job.id}')">${allOn?chk:""}</div>
        <div class="chev-m${exp?" open":""}">${chevSvg}</div>
        <div class="job-m-info">
          <div class="job-m-name">${job.name} ${job.sub}</div>
          <div class="job-m-meta">
            <span>${parts.join(" · ")}</span>
            ${jpd>0?`<span class="red">PD ${fm(jpd)}</span>`:""}
            ${jCrT>0?`<span class="green">-${fm(jCrT)}</span>`:""}
          </div>
        </div>
        <div style="font-size:13px;font-weight:600;color:#111827;white-space:nowrap">${fm(sm(pairs,p=>p.inv.total))}</div>
      </div>`;

      if(exp){
        h+=`<div class="job-m-body">`;
        jobCr.forEach(p=>{
          h+=`<div class="cr-m" onclick="togCr('${p.credit.id}')">
            <div class="chk-m${S.crSel[p.credit.id]?" on":""}" onclick="event.stopPropagation();togCr('${p.credit.id}')">${S.crSel[p.credit.id]?chk:""}</div>
            <div class="cr-m-info"><div class="cr-m-type">${p.credit.type}</div><div class="cr-m-ref">${p.credit.ref}</div></div>
            ${p.credit.isNew?'<span class="badge-m">NEW</span>':""}
            <div class="cr-m-amt">-${fm(p.credit.amount)}</div>
          </div>`;
        });
        pairs.forEach((p,i)=>{
          h+=`<div class="inv-m${jobCr.length>0&&i===0?" cr-m-divider":""}" onclick="togInv('${p.inv.id}')">
            <div class="chk-m${S.checked[p.inv.id]?" on":""}" onclick="event.stopPropagation();togInv('${p.inv.id}')">${S.checked[p.inv.id]?chk:""}</div>
            <div class="inv-m-info"><div class="inv-m-num">${p.inv.num}</div><div class="inv-m-date">Sold on ${p.inv.soldOn}</div></div>
            ${p.inv.isNew?'<span class="badge-m">NEW</span>':""}
            <div class="inv-m-amt">${fm(p.inv.total)}</div>
          </div>`;
        });
        h+=`</div>`;
      }
      h+=`</div>`;
    });
  } else {
    h+=`<div class="flat-m"><div class="flat-m-wrap">`;
    const flatCr=vc;
    flatCr.forEach(p=>{
      h+=`<div class="cr-m" onclick="togCr('${p.credit.id}')">
        <div class="chk-m${S.crSel[p.credit.id]?" on":""}" onclick="event.stopPropagation();togCr('${p.credit.id}')">${S.crSel[p.credit.id]?chk:""}</div>
        <div class="cr-m-info"><div class="cr-m-type">${p.credit.type}</div><div class="cr-m-ref">${p.credit.ref} · ${p.job.name} ${p.job.sub}</div></div>
        ${p.credit.isNew?'<span class="badge-m">NEW</span>':""}
        <div class="cr-m-amt">-${fm(p.credit.amount)}</div>
      </div>`;
    });
    vi.forEach((p,i)=>{
      h+=`<div class="inv-m${flatCr.length>0&&i===0?" cr-m-divider":""}" onclick="togInv('${p.inv.id}')">
        <div class="chk-m${S.checked[p.inv.id]?" on":""}" onclick="event.stopPropagation();togInv('${p.inv.id}')">${S.checked[p.inv.id]?chk:""}</div>
        <div class="inv-m-info"><div class="inv-m-num">${p.inv.num}</div><div class="inv-m-date">${p.job.name} ${p.job.sub} · ${p.inv.soldOn}</div></div>
        ${p.inv.isNew?'<span class="badge-m">NEW</span>':""}
        <div class="inv-m-amt">${fm(p.inv.total)}</div>
      </div>`;
    });
    h+=`</div></div>`;
  }

  h+=`</div>`;

  const activeBank=banks[S.selectedBank];

  if(hasSel){
    const cjIds=[...new Set(ci.map(p=>p.job.id))];
    const addSvg='<svg viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:12px;height:12px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>';
    h+=`<div class="pay-bar">
      <div class="pay-bar-handle" onclick="togPay()"><div class="pay-bar-handle-line"></div></div>
      <div class="pay-bar-collapsed">
        <div class="pay-bar-total-row"><span class="pay-bar-total-label">Total payment</span><span class="pay-bar-total-amt">${fm(pay)}</span></div>
        <div class="pay-bar-bank"><span>${activeBank.name} ****${activeBank.last4}</span><button onclick="event.stopPropagation();openPayMethod()">Change</button></div>
      </div>
      <div class="pay-bar-expanded${S.payExpanded?" show":""}">
        ${S.payMethodOpen?`<div class="pm-dialog">
          <div class="pm-title">Payment method</div>
          ${S.addingMethod?`<div class="pm-form">
            <div class="pm-form-title">Add payment method</div>
            <div class="pm-type-picker">
              <div class="pm-type-opt${S.addType==="bank"?" selected":""}" onclick="setAddType('bank')"><div class="pm-type-opt-icon"><svg viewBox="0 0 24 24" fill="none" stroke="${S.addType==="bank"?"#166534":"#9ca3af"}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width:22px;height:22px"><path d="M3 21h18M3 10h18M5 6l7-3 7 3M4 10v11M20 10v11M8 14v3M12 14v3M16 14v3"/></svg></div><div class="pm-type-opt-label">Bank account</div></div>
              <div class="pm-type-opt${S.addType==="card"?" selected":""}" onclick="setAddType('card')"><div class="pm-type-opt-icon"><svg viewBox="0 0 24 24" fill="none" stroke="${S.addType==="card"?"#166534":"#9ca3af"}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width:22px;height:22px"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg></div><div class="pm-type-opt-label">Credit/debit card</div></div>
            </div>
            ${S.addType==="bank"?`
              <div class="pm-form-field"><div class="pm-form-label">Bank name</div><input class="pm-form-input" id="pm-bank" placeholder="e.g. Wells Fargo"></div>
              <div class="pm-form-row">
                <div class="pm-form-field"><div class="pm-form-label">Routing number</div><input class="pm-form-input" id="pm-routing" placeholder="9 digits"></div>
                <div class="pm-form-field"><div class="pm-form-label">Account number</div><input class="pm-form-input" id="pm-acct" placeholder="Account #"></div>
              </div>
              <div class="pm-form-row">
                <div class="pm-form-field"><div class="pm-form-label">Account type</div>
                  <select class="pm-form-input" id="pm-type"><option>Checking</option><option>Savings</option></select>
                </div>
                <div class="pm-form-field"><div class="pm-form-label">Nickname (optional)</div><input class="pm-form-input" id="pm-nick" placeholder="e.g. Main operating"></div>
              </div>
            `:`
              <div class="pm-form-field"><div class="pm-form-label">Card number</div><input class="pm-form-input" id="pm-cardnum" placeholder="1234 5678 9012 3456" maxlength="19"></div>
              <div class="pm-form-row">
                <div class="pm-form-field"><div class="pm-form-label">Expiration</div><input class="pm-form-input" id="pm-exp" placeholder="MM / YY"></div>
                <div class="pm-form-field"><div class="pm-form-label">CVV</div><input class="pm-form-input" id="pm-cvv" placeholder="123" maxlength="4"></div>
              </div>
              <div class="pm-form-field"><div class="pm-form-label">Name on card</div><input class="pm-form-input" id="pm-cardname" placeholder="Full name"></div>
              <div class="pm-form-field"><div class="pm-form-label">Billing ZIP</div><input class="pm-form-input" id="pm-zip" placeholder="ZIP code" maxlength="10"></div>
            `}
            <div class="pm-form-actions">
              <button class="pm-form-cancel" onclick="cancelAdd()">Cancel</button>
              <button class="pm-form-submit" onclick="submitAdd()">Add ${S.addType==="bank"?"account":"card"}</button>
            </div>
          </div>`:`${banks.map((b,i)=>`<div class="pm-opt${S.selectedBank===i?" selected":""}" onclick="selectBank(${i})">
            <div class="pm-radio"><div class="pm-radio-dot"></div></div>
            <div class="pm-opt-info"><div class="pm-opt-name">${b.name} ****${b.last4}</div><div class="pm-opt-detail">${b.type}</div></div>
          </div>`).join("")}
          <div class="pm-add" onclick="startAdd()"><div class="pm-add-icon">${addSvg}</div><span class="pm-add-label">Add new payment method</span></div>`}
        </div><div class="pay-bar-divider"></div>`:""}
        ${disc>0?`<div class="pay-bar-save">Pay today to save ${fm(disc)}</div>`:""}
        <div class="pay-bar-detail"><span class="label">${cjIds.length} Job${cjIds.length!==1?"s":""} · ${ci.length} Inv</span><span class="val">${fm(invSub)}</span></div>
        <div class="pay-bar-detail"><span class="label">Credits applied</span><span class="val${crApp>0?" green":" muted"}">${crApp?fc(crApp):"—"}</span></div>
        <div class="pay-bar-detail"><span class="label">Early pay discount</span><span class="val${disc>0?" green":" muted"}">${disc?fc(disc):"—"}</span></div>
        <div class="pay-bar-divider"></div>
        <div class="pay-bar-detail"><span class="label" style="font-weight:700;color:#111827">Total payment</span><span class="val" style="font-weight:700;font-size:14px">${fm(pay)}</span></div>
      </div>
    </div>
    <div class="pay-btn-wrap"><button class="pay-btn-m">${payLabel}</button></div>`;
  } else {
    h+=`<div class="pay-bar"><div class="pay-bar-handle"><div class="pay-bar-handle-line"></div></div><div style="padding:0 16px 4px"><div class="pay-bar-total-row"><span class="pay-bar-total-label">No invoices selected</span></div></div></div>
    <div class="pay-btn-wrap"><button class="pay-btn-m" style="opacity:0.4;cursor:default">Select invoices to pay</button></div>`;
  }

  h+=`<div class="home-bar"></div>`;

  document.getElementById("phone").innerHTML=h;
}

function setF(f){S.filter=f;S.filterOpen=false;render()}
function togFilter(){S.filterOpen=!S.filterOpen;render()}
function togPay(){S.payExpanded=!S.payExpanded;if(!S.payExpanded){S.payMethodOpen=false;S.addingMethod=false}render()}
function openPayMethod(){S.payExpanded=true;S.payMethodOpen=true;S.addingMethod=false;render()}
function selectBank(i){S.selectedBank=i;S.payMethodOpen=false;render()}
function startAdd(){S.addingMethod=true;S.addType="bank";render()}
function setAddType(t){S.addType=t;render()}
function cancelAdd(){S.addingMethod=false;render()}
function submitAdd(){
  if(S.addType==="bank"){
    const name=document.getElementById("pm-bank")?.value||"New Bank";
    const acct=document.getElementById("pm-acct")?.value||"0000";
    const type=document.getElementById("pm-type")?.value||"Checking";
    const last4=acct.slice(-4).padStart(4,"0");
    banks.push({name,last4,type});
  } else {
    const num=document.getElementById("pm-cardnum")?.value||"0000";
    const cardName=document.getElementById("pm-cardname")?.value||"Card";
    const last4=num.replace(/\s/g,"").slice(-4).padStart(4,"0");
    banks.push({name:cardName,last4,type:"Card"});
  }
  S.selectedBank=banks.length-1;
  S.addingMethod=false;
  S.payMethodOpen=false;
  render();
}
function togGroup(){S.groupOn=!S.groupOn;render()}
function togSort(){S.sortOpen=!S.sortOpen;render()}
function setSort(s){S.sortMode=s;S.sortOpen=false;render()}
function togExp(id){S.expanded[id]=!S.expanded[id];render()}
function togInv(id){S.checked[id]=!S.checked[id];render()}
function togCr(id){S.crSel[id]=!S.crSel[id];render()}
function togJobChk(jid){
  const j=JOBS.find(x=>x.id===jid);
  const vis=j.invoices.filter(i=>S.filter==="stmt"?i.onStmt:S.filter==="new"?i.isNew:true);
  const on=vis.every(i=>S.checked[i.id]);
  vis.forEach(i=>S.checked[i.id]=!on);render();
}
function togSelAll(){
  const vi=visInvs();const on=vi.every(p=>S.checked[p.inv.id]);
  vi.forEach(p=>S.checked[p.inv.id]=!on);render();
}
function togExpAll(){
  const ids=vjIds();const vJ=JOBS.filter(j=>ids.has(j.id));
  const on=vJ.every(j=>S.expanded[j.id]);
  vJ.forEach(j=>S.expanded[j.id]=!on);render();
}

render();
</script>
